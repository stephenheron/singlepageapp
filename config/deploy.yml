# Kamal config for single-page — a Bun multi-tenant web host.
# Docs: https://kamal-deploy.org
#
# TLS for the dynamic *.BASE_DOMAIN subdomains is handled by a Caddy accessory
# (see config/Caddyfile) using on-demand Let's Encrypt certs — kamal-proxy can't
# issue wildcard certs. Caddy owns :80/:443; kamal-proxy moves to :8080 and keeps
# doing zero-downtime routing to the app.

service: single-page

# Image repository path (WITHOUT the registry host — that's `registry.server`
# below). This is registry/provider-specific, so it's read from the shell env:
#   DigitalOcean  ->  <registry-name>/single-page
#   Docker Hub    ->  <dockerhub-user>/single-page
#   GHCR          ->  <org>/single-page   (with SINGLEPAGE_REGISTRY_SERVER=ghcr.io)
image: <%= ENV.fetch("SINGLEPAGE_IMAGE") %>

# Deploy to this server. The IP is kept out of this committed file: it's read
# from SINGLEPAGE_SERVER_IP in the shell env (ERB), stored in .kamal/secrets.
# Source that file before running kamal (see the header in .kamal/secrets).
servers:
  web:
    - <%= ENV.fetch("SINGLEPAGE_SERVER_IP") %>

# SSH login user for the server + builder. Kept out of this committed file too;
# read from SINGLEPAGE_SERVER_USER (defaults to "root" if unset).
ssh:
  user: <%= ENV.fetch("SINGLEPAGE_SERVER_USER", "root") %>

# --- Proxy ------------------------------------------------------------------
# ssl:false because Caddy terminates TLS in front. kamal-proxy listens on 8080
# (Caddy reverse-proxies to it) and routes all hosts to the single app.
proxy:
  ssl: false
  app_port: 3000
  healthcheck:
    path: /up
  run:
    http_port: 8080
    https_port: 8443

# --- Registry ---------------------------------------------------------------
# Any OCI registry works — set the host + credentials via env. Kamal logs in on
# the builder + server for you. Examples for `SINGLEPAGE_REGISTRY_SERVER`:
#   registry.digitalocean.com | ghcr.io | docker.io | <account>.dkr.ecr.<region>.amazonaws.com
# Credentials come from KAMAL_REGISTRY_USERNAME / KAMAL_REGISTRY_PASSWORD in
# .kamal/secrets. (For DigitalOcean, both are the same read/write API token.)
registry:
  server: <%= ENV.fetch("SINGLEPAGE_REGISTRY_SERVER") %>
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# --- Builder ----------------------------------------------------------------
# Build ON the droplet (native amd64, no local emulation). `local: false` means
# the image is never built on your Mac — you only need the docker CLI + buildx
# plugin locally (`brew install docker docker-buildx`), not a Docker engine/VM.
builder:
  arch: <%= ENV.fetch("SINGLEPAGE_SERVER_ARCH", "amd64") %>
  remote: ssh://<%= ENV.fetch("SINGLEPAGE_SERVER_USER", "root") %>@<%= ENV.fetch("SINGLEPAGE_SERVER_IP") %>
  local: false

# --- Environment ------------------------------------------------------------
env:
  clear:
    # Apex domain; sites are served as <site>.BASE_DOMAIN. Your domain, so it's
    # read from the shell env (see .kamal/secrets).
    BASE_DOMAIN: <%= ENV.fetch("BASE_DOMAIN") %>
    PORT: 3000
  secret:
    - SINGLEPAGE_APP_TOKEN

# --- Persistent storage -----------------------------------------------------
# sites/ holds deployed site content AND per-site SQLite (KV + logs). It MUST
# survive deploys — without this volume every deploy wipes all hosted sites.
volumes:
  - "single_page_sites:/app/sites"

# --- Front proxy (TLS) ------------------------------------------------------
# Caddy on host networking owns :80/:443, issues a cert per real subdomain on
# demand (gated by the app's /internal/allow_domain), and forwards to :8080.
accessories:
  caddy:
    image: caddy:2
    host: <%= ENV.fetch("SINGLEPAGE_SERVER_IP") %>
    network: host
    env:
      clear:
        # Let's Encrypt account email — read from the shell env (see .kamal/secrets).
        ACME_EMAIL: <%= ENV.fetch("ACME_EMAIL") %>
    files:
      - config/Caddyfile:/etc/caddy/Caddyfile
    directories:
      - data:/data # persist issued certs + ACME account across redeploys
      - config:/config

# Convenience: `kamal shell`, `kamal logs-tail`.
aliases:
  shell: app exec --interactive --reuse "bash"
  logs-tail: app logs --follow
